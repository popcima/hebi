<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Anime — AniStream</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>" />
</head>
<body>

<nav class="navbar">
  <a class="nav-logo" href="index.html">ANISTREAM<em>.</em></a>
  <div class="nav-search-wrap">
    <span class="nav-s-icon">⌕</span>
    <input type="text" id="navSearch" placeholder="Search Anime" autocomplete="off" />
  </div>
  <div class="nav-right">
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="search.html" class="active">Browse</a>
    </div>
  </div>
</nav>

<main class="main">
  <div class="search-hero">
    <h1>Discover Anime</h1>
    <div class="search-bar">
      <span class="s-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search by title, genre, studio..." autocomplete="off" />
    </div>
    <div class="genre-chips" id="genreChips"></div>
  </div>

  <div class="section">
    <div id="resultsHeader" class="search-results-header" style="margin-bottom:16px"></div>
    <div class="anime-grid" id="resultsGrid">
      <div class="loading-wrap" style="grid-column:1/-1"><div class="spinner"></div><p class="loading-text">Loading anime...</p></div>
    </div>
    <div style="text-align:center;margin-top:32px" id="loadMoreWrap" hidden>
      <button class="btn btn-secondary" id="loadMoreBtn">Load More</button>
    </div>
  </div>
</main>

<footer class="footer">
  <p>Built with ❤️ using <span>AniStream</span> · Data from AniList · Streaming via MegaPlay</p>
</footer>

<script src="js/api.js"></script>
<script src="js/search.js"></script>
<script>
  document.getElementById('navSearch').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.target.value.trim()) {
      window.location.href = `search.html?q=${encodeURIComponent(e.target.value.trim())}`;
    }
  });
</script>
</body>
</html>
