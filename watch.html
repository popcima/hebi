<body class="watch-page">

<nav class="navbar watch-navbar">
  <button class="watch-nav-square watch-menu-btn" type="button" aria-label="Open menu">
    <i class="fa-solid fa-bars"></i>
  </button>
  <a class="watch-wordmark" href="index.html">HEBiANiME</a>
  <div class="nav-search-wrap">
    <span class="nav-s-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
    <input type="text" id="navSearch" placeholder="Search Anime" autocomplete="off" />
    <span class="watch-search-key">⌘</span>
  </div>
  <button class="watch-nav-square watch-search-submit" id="watchSearchBtn" type="button" aria-label="Search">
    <i class="fa-solid fa-magnifying-glass"></i>
  </button>
  <a class="watch-nav-square watch-shuffle-btn" href="search.html?sort=TRENDING_DESC" aria-label="Discover random anime">
    <i class="fa-solid fa-shuffle"></i>
  </a>
  <div class="watch-nav-spacer"></div>
  <div class="watch-mobile-actions">
    <a class="watch-nav-square" href="search.html" aria-label="Browse anime">
      <i class="fa-solid fa-border-all"></i>
    </a>
  </div>
</nav>

<main class="main watch-main" id="mainContent">
  <div class="loading-wrap" style="min-height:80vh">
    <div class="spinner"></div>
    <p class="loading-text">Loading player...</p>
  </div>
</main>

<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script src="js/watch.js"></script>
<script>
  const watchSearch = document.getElementById('navSearch');
  const submitWatchSearch = () => {
    if (watchSearch.value.trim()) location.href = 'search.html?q=' + encodeURIComponent(watchSearch.value.trim());
  };
  watchSearch.addEventListener('keydown', e => e.key === 'Enter' && submitWatchSearch());
  document.getElementById('watchSearchBtn').addEventListener('click', submitWatchSearch);
</script>
</body>
</html>
